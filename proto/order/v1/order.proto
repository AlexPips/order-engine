syntax = "proto3";

package order.v1;

option go_package = "github.com/AlexPips/order-engine/gen/order/v1;orderpb";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_NEW = 1;
  ORDER_STATUS_PARTIAL = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELED = 4;
  ORDER_STATUS_REJECTED = 5;
}

message Decimal {
  int64 value = 1;
  int32 precision = 2;
}

message Order {
  string id = 1;
  string user_id = 2;
  string symbol = 3;
  Side side = 4;
  OrderType type = 5;
  Decimal price = 6;
  Decimal quantity = 7;
  Decimal filled_quantity = 8;
  OrderStatus status = 9;
  int64 created_at_unix_nano = 10;
  int64 updated_at_unix_nano = 11;
}

message Trade {
  string id = 1;
  string symbol = 2;
  string buy_order_id = 3;
  string sell_order_id = 4;
  Decimal price = 5;
  Decimal quantity = 6;
  int64 executed_at_unix_nano = 7;
}

message PriceLevel {
  Decimal price = 1;
  Decimal quantity = 2;
  int32 order_count = 3;
}

message OrderBookSnapshot {
  string symbol = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
  uint64 sequence = 4;
}

message CreateOrderRequest {
  string user_id = 1;
  string symbol = 2;
  Side side = 3;
  OrderType type = 4;
  Decimal price = 5;
  Decimal quantity = 6;
  string idempotency_key = 7;
  uint32 max_slippage_bps = 8;
}
message CreateOrderResponse { Order order = 1; }

message GetOrderRequest { string id = 1; }
message GetOrderResponse { Order order = 1; }

message CancelOrderRequest { string id = 1; }
message CancelOrderResponse { Order order = 1; }

message GetOrderBookRequest { string symbol = 1; }
message GetOrderBookResponse { OrderBookSnapshot order_book = 1; }

message StreamOrderUpdatesRequest {
  oneof filter {
    string symbol = 1;
    string user_id = 2;
  }
}
message StreamOrderUpdatesResponse { Order order = 1; }

message BatchCreateOrdersRequest {
  CreateOrderRequest order = 1;
}
message BatchCreateOrdersResponse { repeated Order orders = 1; }

message TradeFeedRequest {
  oneof msg {
    string subscribe_symbol = 1;
    CreateOrderRequest new_order = 2;
  }
}
message TradeFeedResponse {
  oneof msg {
    Trade trade = 1;
    Order order_update = 2;
  }
}

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
  rpc StreamOrderUpdates(StreamOrderUpdatesRequest) returns (stream StreamOrderUpdatesResponse);
  rpc BatchCreateOrders(stream BatchCreateOrdersRequest) returns (BatchCreateOrdersResponse);
  rpc TradeFeed(stream TradeFeedRequest) returns (stream TradeFeedResponse);
}
