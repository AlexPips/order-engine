services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orderengine
      POSTGRES_PASSWORD: orderengine
      POSTGRES_DB: orderengine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://orderengine:orderengine@postgres:5432/orderengine?sslmode=disable",
        "up",
      ]

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: "postgres://orderengine:orderengine@postgres:5432/orderengine?sslmode=disable"
      GRPC_PORT: "50051"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
